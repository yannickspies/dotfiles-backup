# === Input responsiveness (matters for Claude Code TUI) ===
set -sg escape-time 0                       # zero ms so Esc/meta keys feel instant
set -g focus-events on                      # let nvim/etc. see focus gain/lose
set -g mouse on
set -g history-limit 50000                  # long scrollback for agent transcripts

# === Terminal / true color ===
# tmux-256color is the modern terminfo entry (italics, extended caps). Provided
# by ncurses-term on Ubuntu 24.04 — verify with `infocmp tmux-256color`.
set -g default-terminal "tmux-256color"
# Wildcard RGB capability for the *outer* terminal regardless of $TERM.
set -ga terminal-overrides ",*:RGB"

# === Clipboard (WezTerm → Windows via OSC 52) ===
set -g set-clipboard on                     # forward yanks out of tmux to host clipboard

# === Visual ===
# Fallback only — overridden by the catppuccin plugin once TPM installs it.
set-option -g status-style bg=default
set-option -g status-fg white

# === WezTerm interop ===
set -g allow-passthrough on                 # kitty graphics protocol through tmux
set -ga update-environment "TERM_PROGRAM"   # propagate WezTerm marker to new panes

# === Indexing (1-based windows/panes, auto-renumber) ===
set -g base-index 1                         # window numbers start at 1, easier to reach
setw -g pane-base-index 1                   # pane numbers start at 1 too
set -g renumber-windows on                  # close window -> remaining ones shift down

# === Pane navigation (prefix + h/j/k/l, vim-style) ===
# Overrides the default `prefix l` (last-window); use `prefix L` instead if needed.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Copy mode: vi keys + WSL clipboard bridge ===
setw -g mode-keys vi                        # v to start selection, y to yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
# `copy-pipe-and-cancel 'clip.exe'` writes to the Windows clipboard AND copies
# into the tmux buffer (which fires OSC 52 via set-clipboard on as well).
# Belt-and-suspenders: works even if OSC 52 is blocked downstream.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'clip.exe'

# === Plugins (TPM) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme: Catppuccin Mocha (pinned tag; matches Windows Terminal + nvim).
# Options must be set before TPM runs the plugin.
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Keep TPM init at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
