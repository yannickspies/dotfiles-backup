# === Input responsiveness (matters for Claude Code TUI) ===
set -sg escape-time 0                       # zero ms so Esc/meta keys feel instant
set -g focus-events on                      # let nvim/etc. see focus gain/lose
set -g mouse on
set -g history-limit 50000                  # long scrollback for agent transcripts

# === Terminal / true color ===
# tmux-256color is the modern terminfo entry (italics, extended caps). Provided
# by ncurses-term on Ubuntu 24.04 — verify with `infocmp tmux-256color`.
set -g default-terminal "tmux-256color"
# Wildcard RGB capability for the *outer* terminal regardless of $TERM.
set -ga terminal-overrides ",*:RGB"

# === Clipboard (WezTerm → Windows via OSC 52) ===
set -g set-clipboard on                     # forward yanks out of tmux to host clipboard

# === Visual ===
set-option -g status-style bg=default
set-option -g status-fg white

# === WezTerm interop ===
set -g allow-passthrough on                 # kitty graphics protocol through tmux
set -ga update-environment "TERM_PROGRAM"   # propagate WezTerm marker to new panes

# === Plugins (TPM) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Keep TPM init at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
